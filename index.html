<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horario — Ciencias Políticas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-text-inverse:#f9f8f4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-primary-highlight:#cedcd8;
  --color-success:#437a22;--color-success-highlight:#d4dfcc;
  --color-error:#c0392b;--color-error-hover:#922b21;
  --color-error-highlight:#fdecea;
  --color-warning:#964219;--color-warning-highlight:#ddcfc6;
  --color-gold:#d19900;--color-gold-highlight:#e9e0c6;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
  --transition-interactive:180ms cubic-bezier(0.16,1,0.3,1);
  --font-display:'Instrument Serif',Georgia,serif;
  --font-body:'Inter','Helvetica Neue',sans-serif;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;
  --content-default:960px;
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-text-inverse:#2b2a28;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-primary-highlight:#313b3b;
  --color-success:#6daa45;--color-success-highlight:#3a4435;
  --color-error:#e05c4b;--color-error-hover:#c0392b;
  --color-error-highlight:#3d2828;
  --color-warning:#bb653b;--color-warning-highlight:#564942;
  --color-gold:#e8af34;--color-gold-highlight:#4d4332;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.2);
  --shadow-md:0 4px 12px oklch(0 0 0/0.3);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.4);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-text-inverse:#2b2a28;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-highlight:#313b3b;
  --color-success:#6daa45;--color-success-highlight:#3a4435;
  --color-error:#e05c4b;--color-error-highlight:#3d2828;
  --color-warning:#bb653b;--color-warning-highlight:#564942;
  --color-gold:#e8af34;--color-gold-highlight:#4d4332;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.2);
  --shadow-md:0 4px 12px oklch(0 0 0/0.3);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.4);
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);line-height:1.6}
img,svg{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a,button,[role="button"]{transition:color var(--transition-interactive),background var(--transition-interactive),border-color var(--transition-interactive),box-shadow var(--transition-interactive)}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}

/* HEADER */
.app-header{background:var(--color-surface);border-bottom:1px solid var(--color-border);padding:var(--space-3) var(--space-4);position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.header-inner{max-width:var(--content-default);margin-inline:auto;display:flex;align-items:center;justify-content:space-between;gap:var(--space-4)}
.header-brand{display:flex;flex-direction:column;gap:2px}
.header-title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:400;color:var(--color-text);line-height:1.1}
.header-sub{font-size:var(--text-xs);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.06em}
.header-actions{display:flex;align-items:center;gap:var(--space-3)}
#clock{font-size:var(--text-sm);font-weight:600;color:var(--color-primary);font-variant-numeric:tabular-nums;letter-spacing:0.03em}
.theme-btn{width:36px;height:36px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);border:1px solid var(--color-border)}
.theme-btn:hover{background:var(--color-surface-dynamic);color:var(--color-text)}

/* WEATHER WIDGET */
.weather-bar{background:var(--color-surface);border-bottom:1px solid var(--color-border);overflow:hidden;max-height:52px;transition:max-height 0.4s cubic-bezier(0.16,1,0.3,1)}
.weather-bar.expanded{max-height:320px}
.weather-toggle{max-width:var(--content-default);margin-inline:auto;padding:var(--space-3) var(--space-4);display:flex;align-items:center;gap:var(--space-3);cursor:pointer;user-select:none;width:100%}
.weather-toggle:hover .weather-summary{color:var(--color-primary)}
.weather-icon-main{font-size:1.4rem;line-height:1}
.weather-summary{font-size:var(--text-sm);color:var(--color-text-muted);flex:1;transition:color var(--transition-interactive)}
.weather-city{font-weight:600;color:var(--color-text)}
.weather-chevron{color:var(--color-text-faint);transition:transform 0.3s ease}
.weather-bar.expanded .weather-chevron{transform:rotate(180deg)}
.weather-details{max-width:var(--content-default);margin-inline:auto;padding:0 var(--space-4) var(--space-4)}
.weather-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:var(--space-3);margin-bottom:var(--space-4)}
.weather-stat{background:var(--color-surface-offset);border-radius:var(--radius-md);padding:var(--space-3);text-align:center}
.weather-stat-label{font-size:var(--text-xs);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px}
.weather-stat-val{font-size:var(--text-base);font-weight:600}
.forecast-row{display:flex;gap:var(--space-2);overflow-x:auto;padding-bottom:var(--space-1)}
.forecast-day{background:var(--color-surface-offset);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);text-align:center;flex:0 0 auto;min-width:80px}
.forecast-day-name{font-size:var(--text-xs);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:var(--space-1)}
.forecast-day-icon{font-size:1.2rem;margin-bottom:var(--space-1)}
.forecast-temps{font-size:var(--text-xs);font-weight:600}
.forecast-max{color:var(--color-text)}
.forecast-min{color:var(--color-text-muted)}

/* MAIN */
.main{max-width:var(--content-default);margin-inline:auto;padding:var(--space-6) var(--space-4) var(--space-16)}

/* NOW CARD */
.now-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-6);margin-bottom:var(--space-6);box-shadow:var(--shadow-md)}
.now-label{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--color-text-muted);margin-bottom:var(--space-3)}
.now-subject{font-family:var(--font-display);font-size:var(--text-xl);font-weight:400;color:var(--color-text);line-height:1.15;margin-bottom:var(--space-2)}
.now-professor{font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-3)}
.now-badges{display:flex;flex-wrap:wrap;gap:var(--space-2)}
.badge{display:inline-flex;align-items:center;gap:var(--space-1);font-size:var(--text-xs);font-weight:600;padding:3px var(--space-2);border-radius:var(--radius-full);letter-spacing:0.03em}
.badge-live{background:var(--color-success-highlight);color:var(--color-success)}
.badge-live::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.badge-time{background:var(--color-primary-highlight);color:var(--color-primary)}
.badge-day{background:var(--color-surface-offset);color:var(--color-text-muted)}
.badge-next{background:var(--color-gold-highlight);color:var(--color-gold)}
.badge-recess{background:var(--color-warning-highlight);color:var(--color-warning)}
.badge-confirm{background:var(--color-surface-dynamic);color:var(--color-text-muted)}
.now-info-text{font-size:var(--text-base);color:var(--color-text);line-height:1.6}
.now-info-text strong{color:var(--color-primary)}

/* TODAY LIST */
.section-title{font-size:var(--text-sm);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-muted);margin-bottom:var(--space-3)}
.schedule-list{display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-8)}
.schedule-item{display:grid;grid-template-columns:80px 1fr;gap:var(--space-3);align-items:start;padding:var(--space-3) var(--space-4);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);transition:box-shadow var(--transition-interactive)}
.schedule-item.past{opacity:0.45}
.schedule-item.active{border-color:var(--color-primary);box-shadow:0 0 0 2px color-mix(in oklch,var(--color-primary) 20%,transparent)}
.schedule-time{font-size:var(--text-xs);font-variant-numeric:tabular-nums;color:var(--color-text-muted);padding-top:2px;line-height:1.4}
.schedule-subject{font-size:var(--text-sm);font-weight:600;color:var(--color-text);line-height:1.3;margin-bottom:2px}
.schedule-prof{font-size:var(--text-xs);color:var(--color-text-muted)}
.schedule-badges{display:flex;gap:var(--space-1);flex-wrap:wrap;margin-top:var(--space-1)}

/* PARCIALES SECTION */
.parciales-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3)}
.parciales-legend{display:flex;gap:var(--space-4);font-size:var(--text-xs);color:var(--color-text-muted);flex-wrap:wrap}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.legend-dot.past{background:var(--color-error)}
.legend-dot.upcoming{background:var(--color-primary)}
.legend-dot.pending{background:var(--color-text-faint)}
.parciales-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--space-3);margin-bottom:var(--space-4)}
.parcial-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-4);position:relative;overflow:hidden}
.parcial-card.past{background:var(--color-error-highlight);border-color:color-mix(in oklch,var(--color-error) 30%,transparent)}
.parcial-card.upcoming{background:var(--color-primary-highlight);border-color:color-mix(in oklch,var(--color-primary) 30%,transparent)}
.parcial-card.today-exam{background:var(--color-gold-highlight);border-color:color-mix(in oklch,var(--color-gold) 40%,transparent)}
.parcial-card.pending{background:var(--color-surface-offset);border-style:dashed}
.parcial-materia{font-size:var(--text-sm);font-weight:700;color:var(--color-text);margin-bottom:4px;line-height:1.3}
.parcial-card.past .parcial-materia{color:var(--color-error)}
.parcial-card.upcoming .parcial-materia{color:var(--color-primary)}
.parcial-prof{font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-2)}
.parcial-fecha{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.06em}
.parcial-card.past .parcial-fecha{color:var(--color-error)}
.parcial-card.upcoming .parcial-fecha{color:var(--color-primary)}
.parcial-card.pending .parcial-fecha{color:var(--color-text-faint)}
.parcial-card.today-exam .parcial-fecha{color:var(--color-gold)}
.parcial-status-badge{position:absolute;top:var(--space-3);right:var(--space-3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;padding:2px 8px;border-radius:var(--radius-full)}
.parcial-card.past .parcial-status-badge{background:var(--color-error);color:#fff}
.parcial-card.upcoming .parcial-status-badge{background:var(--color-primary);color:#fff}
.parcial-card.today-exam .parcial-status-badge{background:var(--color-gold);color:#fff}
.parcial-card.pending .parcial-status-badge{background:var(--color-surface-dynamic);color:var(--color-text-muted)}
.parcial-days-remaining{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:4px}
.parcial-card.upcoming .parcial-days-remaining{color:var(--color-primary)}

/* DIVIDER */
.section-divider{height:1px;background:var(--color-divider);margin:var(--space-8) 0}

@media(max-width:600px){
  .schedule-item{grid-template-columns:70px 1fr}
  .parciales-grid{grid-template-columns:1fr}
  .forecast-row{gap:var(--space-1)}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-brand">
      <span class="header-title">Ciencias Políticas</span>
      <span class="header-sub">Primer Semestre · MS Mirtha &amp; Saúl</span>
    </div>
    <div class="header-actions">
      <span id="clock">--:--:--</span>
      <button class="theme-btn" data-theme-toggle aria-label="Cambiar tema">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- WEATHER WIDGET -->
<div class="weather-bar" id="weatherBar">
  <button class="weather-toggle" id="weatherToggle" aria-expanded="false" aria-label="Ver pronóstico del clima">
    <span class="weather-icon-main" id="wIconMain">⛅</span>
    <span class="weather-summary">
      <span class="weather-city">Asunción</span>
      <span id="wSummaryText"> · Cargando clima...</span>
    </span>
    <svg class="weather-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
  </button>
  <div class="weather-details" id="weatherDetails">
    <div class="weather-grid" id="weatherGrid">
      <div class="weather-stat"><div class="weather-stat-label">Temp</div><div class="weather-stat-val" id="wTemp">--</div></div>
      <div class="weather-stat"><div class="weather-stat-label">Sensación</div><div class="weather-stat-val" id="wFeels">--</div></div>
      <div class="weather-stat"><div class="weather-stat-label">Humedad</div><div class="weather-stat-val" id="wHumidity">--</div></div>
      <div class="weather-stat"><div class="weather-stat-label">Viento</div><div class="weather-stat-val" id="wWind">--</div></div>
    </div>
    <div class="section-title">Próximos 5 días</div>
    <div class="forecast-row" id="forecastRow"><span style="color:var(--color-text-faint);font-size:var(--text-sm)">Cargando...</span></div>
  </div>
</div>

<main class="main">

  <!-- NOW CARD -->
  <div class="now-card" id="nowCard">
    <div class="now-label">¿Qué materia toca ahora?</div>
    <div class="now-subject" id="nowSubject">Calculando...</div>
    <div class="now-professor" id="nowProfessor"></div>
    <div class="now-badges" id="nowBadges"></div>
    <div class="now-info-text" id="nowInfo" style="margin-top:var(--space-3);display:none"></div>
  </div>

  <!-- TODAY SCHEDULE -->
  <div class="section-title" id="todayTitle">Materias de hoy</div>
  <div class="schedule-list" id="scheduleList"></div>

  <div class="section-divider"></div>

  <!-- PARCIALES -->
  <div class="parciales-header">
    <div class="section-title" style="margin-bottom:0">📋 Horario de Primeras Parciales</div>
    <div class="parciales-legend">
      <span><span class="legend-dot past"></span>Finalizado</span>
      <span><span class="legend-dot upcoming"></span>Próximo</span>
      <span><span class="legend-dot pending"></span>A confirmar</span>
    </div>
  </div>
  <div class="parciales-grid" id="parcialesGrid"></div>

</main>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────

const PROFESORES = {
  'Guaraní I':                            'Prof. Nery Fátima Benítez de Dios',
  'Castellano':                           'Prof. Celeste Fleitas Guirland',
  'Historia Social Latinoamericana':      'Prof. Máximo Luis Zorrilla',
  'Historia del Paraguay':                'Prof. Beatriz Espínola Zaracho',
  'Introducción a la Sociología':         'Prof. Ilda Mayereger / Prof. Oscar Báez',
  'Introducción a las CC. Jurídicas':     'Prof. Abog. Raúl Florentín',
  'Seminario I':                          'Prof. Olga Cuevas',
  'Historia de las Inst. Jurídicas':      'Profesoras por confirmar',
};

// horario: [dia(0=lun..4=vie), inicio_min, fin_min, materia]
const SCHEDULE = [
  // LUNES
  [0,1010,1035,'Guaraní I'],[0,1035,1060,'Guaraní I'],
  [0,1060,1085,'Introducción a las CC. Jurídicas'],[0,1085,1110,'Introducción a las CC. Jurídicas'],
  [0,1169,1205,'Seminario I'],[0,1205,1235,'Seminario I'],
  // MARTES
  [1,1010,1035,'Historia de las Inst. Jurídicas'],[1,1035,1060,'Historia de las Inst. Jurídicas'],
  [1,1060,1085,'Historia de las Inst. Jurídicas'],
  [1,1085,1110,'Historia Social Latinoamericana'],
  [1,1169,1205,'Historia Social Latinoamericana'],
  [1,1205,1235,'Introducción a la Sociología'],[1,1235,1260,'Introducción a la Sociología'],
  // MIÉRCOLES
  [2,1010,1035,'Castellano'],
  [2,1035,1060,'Historia del Paraguay'],[2,1060,1085,'Historia del Paraguay'],[2,1085,1110,'Historia del Paraguay'],
  [2,1169,1205,'Historia Social Latinoamericana'],[2,1205,1235,'Historia Social Latinoamericana'],
  // JUEVES
  [3,1010,1035,'Castellano'],[3,1035,1060,'Castellano'],[3,1060,1085,'Castellano'],
  [3,1085,1110,'Introducción a la Sociología'],
  [3,1169,1205,'Introducción a la Sociología'],
  [3,1205,1235,'Introducción a las CC. Jurídicas'],[3,1235,1260,'Introducción a las CC. Jurídicas'],
  // VIERNES
  [4,1010,1035,'Castellano'],
  [4,1035,1060,'Guaraní I'],[4,1060,1085,'Guaraní I'],
  [4,1085,1110,'Seminario I'],
  [4,1169,1205,'Seminario I'],
];

const RECESS_START = 1170; // 19:30
const RECESS_END   = 1185; // 19:45

// Agrupa bloques consecutivos de la misma materia en el mismo día
function mergeBlocks(day) {
  const blocks = SCHEDULE.filter(s => s[0] === day).sort((a,b)=>a[1]-b[1]);
  const merged = [];
  for(const b of blocks){
    const last = merged[merged.length-1];
    if(last && last[3]===b[3] && last[2]===b[1]) last[2]=b[2];
    else merged.push([...b]);
  }
  return merged;
}

function minToStr(m){ return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }

// ── PARCIALES ────────────────────────────────────────────────────────────────

const PARCIALES = [
  { materia:'Seminario I',          prof: PROFESORES['Seminario I'],         fecha: null,   label:'Proceso concluido', concluded: true },
  { materia:'Guaraní I',            prof: PROFESORES['Guaraní I'],           fecha:'2026-03-23' },
  { materia:'Castellano',           prof: PROFESORES['Castellano'],          fecha:'2026-04-09' },
  { materia:'Introducción a las CC. Jurídicas', prof: PROFESORES['Introducción a las C. Jurídicas'], fecha: null, label:'A Confirmar' },
  { materia:'Historia del Paraguay', prof: PROFESORES['Historia del Paraguay'], fecha:'2026-04-22' },
  { materia:'Introducción a la Sociología', prof: PROFESORES['Introducción a la Sociología'], fecha:'2026-03-31' },
  { materia:'Historia de las Inst. Jurídicas', prof: PROFESORES['Historia de las Inst. Jurídicas'], fecha:'2026-04-14' },
  { materia:'Historia Social Latinoamericana', prof: PROFESORES['Historia Social Latinoamericana'], fecha: null, label:'A Confirmar' },
];

// ── WEATHER ──────────────────────────────────────────────────────────────────

const WMO_ICONS = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
const WMO_DESC  = {0:'Despejado',1:'Mayorm. despejado',2:'Parcialmente nublado',3:'Nublado',45:'Niebla',48:'Niebla',51:'Llovizna leve',53:'Llovizna',55:'Llovizna intensa',61:'Lluvia leve',63:'Lluvia moderada',65:'Lluvia intensa',71:'Nieve leve',73:'Nieve',75:'Nieve intensa',80:'Chubascos leves',81:'Chubascos',82:'Chubascos fuertes',95:'Tormenta',96:'Tormenta con granizo',99:'Tormenta fuerte'};

let weatherLoaded = false;

async function loadWeather(){
  if(weatherLoaded) return;
  weatherLoaded = true;
  try{
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-25.2867&longitude=-57.647&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=America%2FAsuncion&forecast_days=6');
    const d = await r.json();
    const c = d.current;
    const code = c.weather_code;
    document.getElementById('wIconMain').textContent = WMO_ICONS[code]||'⛅';
    document.getElementById('wSummaryText').textContent = ` · ${WMO_DESC[code]||''} ${Math.round(c.temperature_2m)}°C`;
    document.getElementById('wTemp').textContent = Math.round(c.temperature_2m)+'°C';
    document.getElementById('wFeels').textContent = Math.round(c.apparent_temperature)+'°C';
    document.getElementById('wHumidity').textContent = c.relative_humidity_2m+'%';
    document.getElementById('wWind').textContent = Math.round(c.wind_speed_10m)+' km/h';
    const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const fr = document.getElementById('forecastRow');
    fr.innerHTML='';
    for(let i=1;i<6;i++){
      const dt = new Date(d.daily.time[i]+'T12:00:00');
      const wc = d.daily.weather_code[i];
      fr.innerHTML+=`<div class="forecast-day">
        <div class="forecast-day-name">${days[dt.getDay()]}</div>
        <div class="forecast-day-icon">${WMO_ICONS[wc]||'⛅'}</div>
        <div class="forecast-temps"><span class="forecast-max">${Math.round(d.daily.temperature_2m_max[i])}°</span> <span class="forecast-min">${Math.round(d.daily.temperature_2m_min[i])}°</span></div>
      </div>`;
    }
  }catch(e){ document.getElementById('wSummaryText').textContent=' · No disponible'; }
}

document.getElementById('weatherToggle').addEventListener('click',()=>{
  const bar = document.getElementById('weatherBar');
  const btn = document.getElementById('weatherToggle');
  const expanded = bar.classList.toggle('expanded');
  btn.setAttribute('aria-expanded', expanded);
  if(expanded) loadWeather();
});

// ── CLOCK & MAIN LOGIC ───────────────────────────────────────────────────────

const DAYS_ES = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

function update(){
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('es-PY',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});

  const jsDay = now.getDay(); // 0=Dom
  const dayIdx = jsDay === 0 ? 6 : jsDay - 1; // 0=Lun..6=Dom
  const cur = now.getHours()*60 + now.getMinutes();

  const nowSubEl   = document.getElementById('nowSubject');
  const nowProfEl  = document.getElementById('nowProfessor');
  const nowBadges  = document.getElementById('nowBadges');
  const nowInfo    = document.getElementById('nowInfo');
  const listEl     = document.getElementById('scheduleList');
  const todayTitle = document.getElementById('todayTitle');

  if(dayIdx >= 5){
    nowSubEl.textContent = '🎉 Hoy no hay clases';
    nowProfEl.textContent = '';
    nowBadges.innerHTML = `<span class="badge badge-day">${DAYS_ES[dayIdx]}</span>`;
    nowInfo.style.display='none';
    listEl.innerHTML='<p style="color:var(--color-text-muted);font-size:var(--text-sm)">No hay clases este día.</p>';
    todayTitle.textContent = 'No hay clases hoy';
    return;
  }

  const todayBlocks = mergeBlocks(dayIdx);
  todayTitle.textContent = `Materias del ${DAYS_ES[dayIdx]}`;

  // Render schedule list
  listEl.innerHTML='';
  if(todayBlocks.length===0){
    listEl.innerHTML='<p style="color:var(--color-text-muted);font-size:var(--text-sm)">No hay clases este día.</p>';
  } else {
    for(const b of todayBlocks){
      const [,start,end,subj] = b;
      const isPast   = cur > end;
      const isActive = cur >= start && cur < end;
      const isRecess = (start <= RECESS_START && end > RECESS_START) ? false : false; // receso handled separately
      const div = document.createElement('div');
      div.className = 'schedule-item' + (isPast?' past':'') + (isActive?' active':'');
      div.innerHTML = `
        <div class="schedule-time">${minToStr(start)}<br>${minToStr(end)}</div>
        <div>
          <div class="schedule-subject">${subj}</div>
          <div class="schedule-prof">${PROFESORES[subj]||''}</div>
          ${isActive?'<div class="schedule-badges"><span class="badge badge-live">En curso</span></div>':''}
        </div>`;
      listEl.appendChild(div);
    }
  }

  // NOW CARD
  const isRecess = cur >= RECESS_START && cur < RECESS_END;
  const currentBlock = todayBlocks.find(b => cur >= b[1] && cur < b[2]);
  const nextBlock    = todayBlocks.find(b => b[1] > cur);
  const firstBlock   = todayBlocks[0];
  const lastEnd      = todayBlocks.length ? todayBlocks[todayBlocks.length-1][2] : 0;

  nowInfo.style.display='none';

  if(isRecess){
    nowSubEl.textContent = '☕ Receso';
    nowProfEl.textContent = '';
    const minsLeft = RECESS_END - cur;
    nowBadges.innerHTML = `<span class="badge badge-recess">19:30 – 19:45</span>${nextBlock?`<span class="badge badge-next">Próxima: ${nextBlock[3]}</span>`:''}`;
    nowInfo.style.display='block';
    nowInfo.innerHTML = `Quedan <strong>${minsLeft} min</strong> de receso.${nextBlock?` Próxima materia a las <strong>${minToStr(nextBlock[1])}</strong>.`:''}`;
  } else if(currentBlock){
    const [,start,end,subj] = currentBlock;
    nowSubEl.textContent = subj;
    nowProfEl.textContent = PROFESORES[subj]||'';
    const minsLeft = end - cur;
    nowBadges.innerHTML = `<span class="badge badge-live">En curso</span><span class="badge badge-time">${minToStr(start)} – ${minToStr(end)}</span>`;
    nowInfo.style.display='block';
    nowInfo.innerHTML = `Quedan <strong>${minsLeft} min</strong> para que finalice esta clase.`;
  } else if(firstBlock && cur < firstBlock[1]){
    nowSubEl.textContent = 'Las clases aún no comenzaron';
    nowProfEl.textContent = '';
    nowBadges.innerHTML = `<span class="badge badge-day">${DAYS_ES[dayIdx]}</span>`;
    nowInfo.style.display='block';
    nowInfo.innerHTML = `Las clases de hoy arrancan a las <strong>${minToStr(firstBlock[1])} hs</strong> con <strong>${firstBlock[3]}</strong>.<br><span style="font-size:var(--text-sm);color:var(--color-text-muted)">${PROFESORES[firstBlock[3]]||''}</span>`;
  } else if(cur >= lastEnd && lastEnd > 0){
    nowSubEl.textContent = '✅ Clases finalizadas';
    nowProfEl.textContent = '';
    nowBadges.innerHTML = `<span class="badge badge-day">${DAYS_ES[dayIdx]}</span>`;
    nowInfo.style.display='block';
    nowInfo.innerHTML = `Las clases de hoy ya terminaron. ¡Hasta mañana!`;
  } else {
    // entre bloques
    if(nextBlock){
      nowSubEl.textContent = 'Entre clases';
      nowProfEl.textContent = '';
      nowBadges.innerHTML = `<span class="badge badge-next">Próxima: ${nextBlock[3]}</span>`;
      nowInfo.style.display='block';
      nowInfo.innerHTML = `La próxima materia es <strong>${nextBlock[3]}</strong> a las <strong>${minToStr(nextBlock[1])} hs</strong>.<br><span style="font-size:var(--text-sm);color:var(--color-text-muted)">${PROFESORES[nextBlock[3]]||''}</span>`;
    }
  }
}

// ── PARCIALES RENDER ─────────────────────────────────────────────────────────

function renderParciales(){
  const today = new Date();
  today.setHours(0,0,0,0);
  const grid = document.getElementById('parcialesGrid');
  grid.innerHTML='';

  // Sort: concluded first, then by date asc, pending at end
  const sorted = [...PARCIALES].sort((a,b)=>{
    if(a.concluded && !b.concluded) return -1;
    if(!a.concluded && b.concluded) return 1;
    if(!a.fecha && !b.fecha) return 0;
    if(!a.fecha) return 1;
    if(!b.fecha) return -1;
    return new Date(a.fecha) - new Date(b.fecha);
  });

  for(const p of sorted){
    const card = document.createElement('div');
    card.className = 'parcial-card';
    let statusText='', dateText='', daysText='', stateClass='';

    if(p.concluded){
      stateClass='past'; statusText='Concluido'; dateText='Proceso finalizado'; daysText='';
    } else if(!p.fecha){
      stateClass='pending'; statusText='Sin fecha'; dateText=p.label||'A Confirmar'; daysText='';
    } else {
      const examDate = new Date(p.fecha+'T00:00:00');
      const diffMs = examDate - today;
      const diffDays = Math.round(diffMs/(1000*60*60*24));
      const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      dateText = `${examDate.getDate()} de ${meses[examDate.getMonth()]} ${examDate.getFullYear()}`;
      if(diffDays < 0){ stateClass='past'; statusText='Finalizado'; daysText=`Hace ${Math.abs(diffDays)} días`; }
      else if(diffDays===0){ stateClass='today-exam'; statusText='¡HOY!'; daysText='Es hoy'; }
      else if(diffDays<=14){ stateClass='upcoming'; statusText=`En ${diffDays}d`; daysText=`Faltan ${diffDays} días`; }
      else { stateClass='upcoming'; statusText=`En ${diffDays}d`; daysText=`Faltan ${diffDays} días`; }
    }

    card.classList.add(stateClass);
    card.innerHTML=`
      <div class="parcial-status-badge">${statusText}</div>
      <div class="parcial-materia">${p.materia}</div>
      <div class="parcial-prof">${p.prof}</div>
      <div class="parcial-fecha">${dateText}</div>
      ${daysText?`<div class="parcial-days-remaining">${daysText}</div>`:''}`;
    grid.appendChild(card);
  }
}

// ── THEME TOGGLE ─────────────────────────────────────────────────────────────

(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  const sunSVG='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  const moonSVG='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  function setIcon(){ t.innerHTML = d==='dark'?sunSVG:moonSVG; }
  setIcon();
  t&&t.addEventListener('click',()=>{
    d=d==='dark'?'light':'dark';
    r.setAttribute('data-theme',d);
    setIcon();
  });
})();

// ── INIT ─────────────────────────────────────────────────────────────────────

renderParciales();
update();
setInterval(update, 1000);
</script>
